<div class="container">
    <h2>Actualizar Producto</h2>
    <mat-spinner *ngIf="isSpinning"></mat-spinner>
    <form [formGroup]="updateProductForm" (ngSubmit)="updateProduct()" [class.spinner-active]="isSpinning">

        <div class="file-upload-container">

            <label class="file-upload-label">
                <span>Elige un archivo</span>
                <input type="file" id="fileInput" (change)="onFileSelected($event)" hidden>
                <mat-icon>attach_file</mat-icon>
            </label>

            <div *ngIf="imagePreview" class="image-preview">
                <div class="circle-image">
                    <img [src]="imagePreview" alt="Existing Image" class="preview-image">
                </div>
            </div>

            <div *ngIf="existingImage" class="image-preview">
                <div class="circle-image">
                    <img [src]="existingImage" alt="Existing Image" class="preview-image">
                </div>
            </div>

        </div>

        <mat-form-field appearance="outline" class="form-field">
            <mat-label>Elige una Categoría</mat-label>
            <mat-select formControlName="categoryId" name="categoryId">
                <mat-option *ngFor="let category of listOfCategories" [value]="category.id">
                    {{category.name}}
                </mat-option>
            </mat-select>
            <mat-error *ngIf="updateProductForm.get('categoryId')?.hasError('required')">Este campo es requerido!</mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="form-field">
            <mat-label>Nombre</mat-label>
            <input matInput type="text" placeholder="Name" formControlName="name" />
            <mat-error *ngIf="updateProductForm.get('name')?.hasError('required')">Este campo es requerido!</mat-error>
        </mat-form-field>


        <mat-form-field appearance="outline" class="form-field">
            <mat-label>Precio</mat-label>
            <input matInput type="number" placeholder="Price" formControlName="price" />
            <mat-error *ngIf="updateProductForm.get('price')?.hasError('required')">Este campo es requerido!</mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="form-field">
            <mat-label>Descripción</mat-label>
            <textarea matInput placeholder="Description" formControlName="description"></textarea>
            <mat-error *ngIf="updateProductForm.get('description')?.hasError('required')">Este campo es requerido!</mat-error>
        </mat-form-field>

        <button mat-raised-button color="primary" type="submit">Actualizar Producto</button>
    </form>
</div>
